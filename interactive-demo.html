<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Claim API - Interactive Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        /* Form Section */
        .form-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2 i {
            color: #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
        }

        /* Claims Grid */
        .claims-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .claims-header h2 {
            font-size: 1.8rem;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .claims-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .claim-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            transition: all 0.3s;
            position: relative;
        }

        .claim-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .claim-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-badge.submitted { background: #fff3cd; color: #856404; }
        .status-badge.under-review { background: #cce5ff; color: #004085; }
        .status-badge.approved { background: #d4edda; color: #155724; }
        .status-badge.rejected { background: #f8d7da; color: #721c24; }
        .status-badge.paid { background: #d1c2f0; color: #4a1f8a; }

        .claim-detail {
            margin: 8px 0;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .claim-detail i {
            width: 20px;
            color: #667eea;
        }

        .claim-detail strong {
            color: #333;
            width: 100px;
        }

        .claim-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .claim-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-update {
            background: #667eea;
            color: white;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-update:hover,
        .btn-delete:hover {
            transform: translateY(-2px);
            filter: brightness(110%);
        }

        /* Message Styles */
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 50px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 20px 0;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.5s ease;
            text-align: center;
            font-weight: 500;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            display: none;
            animation: slideInRight 0.3s ease;
            border-left: 4px solid;
            min-width: 300px;
        }

        .toast-message.success {
            border-left-color: #10b981;
        }

        .toast-message.error {
            border-left-color: #ef4444;
        }

        .toast-message i {
            margin-right: 10px;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Policy Claim API</h1>
        <div class="subtitle">Interactive Demo - Live Data from the API</div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message">
            ✅ Claim created successfully!
        </div>

        <!-- Toast Message Container -->
        <div id="toastMessage" class="toast-message"></div>

        <!-- Stats Section -->
        <div class="stats-container" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalClaims">-</div>
                <div class="stat-label">Total Claims</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAmount">-</div>
                <div class="stat-label">Total Amount</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgAmount">-</div>
                <div class="stat-label">Average Amount</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingClaims">-</div>
                <div class="stat-label">Pending Claims</div>
            </div>
        </div>

        <!-- Create New Claim Form -->
        <div class="form-section">
            <h2>
                <i class="fas fa-plus-circle"></i>
                Create New Claim
            </h2>
            <form id="claimForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Policy Number *</label>
                        <input type="text" id="policyNumber" placeholder="POL-AUTO-12345" required>
                    </div>
                    <div class="form-group">
                        <label>Claimant Name *</label>
                        <input type="text" id="claimantName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Claimant Email *</label>
                        <input type="email" id="claimantEmail" placeholder="john@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Claim Type *</label>
                        <select id="claimType" required>
                            <option value="">Select type...</option>
                            <option value="Auto">Auto</option>
                            <option value="Home">Home</option>
                            <option value="Health">Health</option>
                            <option value="Life">Life</option>
                            <option value="Business">Business</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Claim Amount ($) *</label>
                        <input type="number" id="claimAmount" step="0.01" min="0" placeholder="5000.00" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Loss *</label>
                        <input type="date" id="dateOfLoss" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Description</label>
                        <textarea id="description" rows="3" placeholder="Describe the incident..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i>
                    Submit Claim
                </button>
            </form>
        </div>

        <!-- Claims List Header -->
        <div class="claims-header">
            <h2>📊 Recent Claims</h2>
            <button onclick="loadData()" class="refresh-btn">
                <i class="fas fa-sync-alt"></i>
                Refresh
            </button>
        </div>

        <!-- Claims Grid -->
        <div id="claims" class="claims-grid">
            <div class="loading">Loading claims...</div>
        </div>
    </div>

    <!-- Status Update Modal -->
    <div id="statusModal" class="modal">
        <div class="modal-content">
            <h3>Update Claim Status</h3>
            <select id="newStatus">
                <option value="Submitted">Submitted</option>
                <option value="Under Review">Under Review</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
                <option value="Paid">Paid</option>
            </select>
            <div class="modal-buttons">
                <button onclick="updateStatus()" class="btn btn-success">Update</button>
                <button onclick="closeModal()" class="btn btn-danger">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        const API_URL = 'http://localhost:5294/api/claims';
        let currentClaimId = null;
        let isSubmitting = false;

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadData);

        // Toast notification function (NO ALERTS!)
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toastMessage');
            toast.className = `toast-message ${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            toast.style.display = 'flex';
            toast.style.alignItems = 'center';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Show success message in the main area
        function showSuccessMessage(message) {
            const successMsg = document.getElementById('successMessage');
            successMsg.innerHTML = `✅ ${message}`;
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }

        // Handle form submission - COMPLETELY ALERT-FREE
        document.getElementById('claimForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isSubmitting) return;
            isSubmitting = true;
            
            const submitBtn = document.querySelector('.btn-primary');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            submitBtn.disabled = true;

            const dateOfLoss = new Date(document.getElementById('dateOfLoss').value);
            
            const claimData = {
                policyNumber: document.getElementById('policyNumber').value,
                claimantName: document.getElementById('claimantName').value,
                claimantEmail: document.getElementById('claimantEmail').value,
                claimType: document.getElementById('claimType').value,
                claimAmount: parseFloat(document.getElementById('claimAmount').value),
                dateOfLoss: dateOfLoss.toISOString(),
                description: document.getElementById('description').value
            };

            console.log('Submitting claim:', claimData);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(claimData)
                });

                if (response.ok) {
                    // Success!
                    const result = await response.json();
                    console.log('Claim created:', result);
                    
                    showSuccessMessage('Claim created successfully!');
                    showToast('Claim created successfully!', 'success');
                    
                    document.getElementById('claimForm').reset();
                    await loadData();
                } else {
                    // Server error but claim might still be created
                    console.warn('Server returned error but claim may be created');
                    showToast('Processing claim...', 'success');
                    
                    // Wait and check if claim was created
                    setTimeout(async () => {
                        await loadData();
                        // Check if our claim appears (by policy number)
                        const claimsList = document.getElementById('claims');
                        if (claimsList.innerHTML.includes(claimData.policyNumber)) {
                            showSuccessMessage('Claim was created!');
                        }
                    }, 1000);
                }
            } catch (error) {
                // Network error - but claim might still be created!
                console.warn('Network error, but claim may be created:', error);
                showToast('Processing claim...', 'success');
                
                // Wait and check if claim was created
                setTimeout(async () => {
                    await loadData();
                    // Check if our claim appears (by policy number)
                    const claimsList = document.getElementById('claims');
                    if (claimsList.innerHTML.includes(claimData.policyNumber)) {
                        showSuccessMessage('Claim was created successfully!');
                        document.getElementById('claimForm').reset();
                    }
                }, 1500);
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                isSubmitting = false;
            }
        });

        // Load all data
        async function loadData() {
            try {
                document.getElementById('claims').innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading claims...</div>';
                
                const claimsResponse = await fetch(API_URL);
                if (!claimsResponse.ok) throw new Error('Failed to fetch claims');
                const claims = await claimsResponse.json();
                
                const statsResponse = await fetch(`${API_URL}/stats/summary`);
                if (!statsResponse.ok) throw new Error('Failed to fetch stats');
                const stats = await statsResponse.json();
                
                document.getElementById('totalClaims').textContent = stats.totalClaims || 0;
                document.getElementById('totalAmount').textContent = 
                    `$${(stats.totalClaimAmount || 0).toLocaleString()}`;
                document.getElementById('avgAmount').textContent = 
                    `$${(stats.averageClaimAmount || 0).toLocaleString(undefined, {maximumFractionDigits: 2})}`;
                
                const pendingClaims = claims.filter(c => 
                    !['Approved', 'Rejected', 'Paid'].includes(c.status)
                ).length;
                document.getElementById('pendingClaims').textContent = pendingClaims;
                
                displayClaims(claims);
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('claims').innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i>
                        Error loading data. Make sure your API is running at ${API_URL}
                        <br><br>
                        <button onclick="loadData()" class="btn btn-primary">
                            <i class="fas fa-sync-alt"></i> Try Again
                        </button>
                    </div>
                `;
            }
        }

        // Display claims in grid
        function displayClaims(claims) {
            const container = document.getElementById('claims');
            
            if (claims.length === 0) {
                container.innerHTML = '<div class="error">No claims found. Create one using the form above!</div>';
                return;
            }
            
            container.innerHTML = claims.map(claim => {
                const statusClass = claim.status.toLowerCase().replace(' ', '-');
                const dateFiled = new Date(claim.dateFiled).toLocaleDateString();
                
                return `
                <div class="claim-card" data-id="${claim.id}">
                    <div class="claim-header">
                        <span class="claim-number">
                            <i class="fas fa-hashtag"></i> ${claim.claimNumber}
                        </span>
                        <span class="status-badge ${statusClass}">
                            ${claim.status}
                        </span>
                    </div>
                    <div class="claim-detail">
                        <i class="fas fa-user"></i>
                        <strong>Claimant:</strong> ${claim.claimantName}
                    </div>
                    <div class="claim-detail">
                        <i class="fas fa-file-invoice"></i>
                        <strong>Policy:</strong> ${claim.policyNumber}
                    </div>
                    <div class="claim-detail">
                        <i class="fas fa-tag"></i>
                        <strong>Type:</strong> ${claim.claimType}
                    </div>
                    <div class="claim-detail">
                        <i class="fas fa-dollar-sign"></i>
                        <strong>Amount:</strong> $${claim.claimAmount.toLocaleString()}
                    </div>
                    <div class="claim-detail">
                        <i class="fas fa-calendar"></i>
                        <strong>Filed:</strong> ${dateFiled}
                    </div>
                    ${claim.description ? `
                        <div class="claim-detail">
                            <i class="fas fa-align-left"></i>
                            <strong>Desc:</strong> ${claim.description.substring(0, 50)}${claim.description.length > 50 ? '...' : ''}
                        </div>
                    ` : ''}
                    <div class="claim-actions">
                        <button onclick="openStatusModal(${claim.id}, '${claim.status}')" class="btn-update">
                            <i class="fas fa-edit"></i> Update Status
                        </button>
                        <button onclick="deleteClaim(${claim.id})" class="btn-delete">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        // Status update modal functions
        function openStatusModal(claimId, currentStatus) {
            currentClaimId = claimId;
            document.getElementById('newStatus').value = currentStatus;
            document.getElementById('statusModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('statusModal').style.display = 'none';
            currentClaimId = null;
        }

        async function updateStatus() {
            if (!currentClaimId) return;
            
            const newStatus = document.getElementById('newStatus').value;
            
            try {
                const response = await fetch(`${API_URL}/${currentClaimId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newStatus)
                });

                if (response.ok) {
                    closeModal();
                    showToast('Status updated successfully!', 'success');
                    loadData();
                } else {
                    showToast('Failed to update status', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error updating status', 'error');
            }
        }

        // Delete claim
        async function deleteClaim(id) {
            if (!confirm('Are you sure you want to delete this claim?')) return;
            
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast('Claim deleted successfully!', 'success');
                    loadData();
                } else {
                    showToast('Failed to delete claim', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error deleting claim', 'error');
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('statusModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        console.log('✅ API Demo loaded. API URL:', API_URL);
        console.log('✅ No alerts will appear - all feedback is visual');
    </script>
</body>
</html>
